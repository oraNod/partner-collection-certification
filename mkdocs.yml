---
site_name: Red Hat Partner Collection Certification
site_url: https://docs.ansible.com/projects/partner-certification/
repo_url: https://github.com/ansible/partner-certification
edit_uri: blob/main/docs/
docs_dir: docs
strict: true
validation:
  nav:
    not_in_nav: INFO
not_in_nav: |
  readme-template.md

theme:
  name: 'ansible'

plugins:
  - llmstxt:
      markdown_description: >-
        Requirements for certifying Ansible content collections on
        Red Hat Ansible Automation Hub. Collections must meet all
        requirements documented here to pass certification.
      full_output: llms-full.txt
      sections:
        Certification requirements:
          - index.md
          - versioning.md
          - ansible-core-compatibility.md
          - licensing.md
          - readmes.md
          - changelogs.md
          - dependencies.md
          - sanity-testing.md
          - static-analysis.md
        Certification tooling:
          - tooling.md
        Review output:
          - review_summary.md

# When adding or removing nav sections, update docs/review_summary.md to match.
nav:
  - Certification requirements:
      - index.md
      - Versioning: versioning.md
      - Ansible core compatibility: ansible-core-compatibility.md
      - Licensing: licensing.md
      - Project README: readmes.md
      - Changelogs: changelogs.md
      - Dependencies: dependencies.md
      - Sanity testing: sanity-testing.md
      - Static analysis: static-analysis.md
  - Certification tooling: tooling.md
